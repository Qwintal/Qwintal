<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Banner</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1280px; height: 400px; overflow: hidden; background: #020408; font-family: 'Space Mono', monospace; }

  .banner {
    position: relative; width: 100%; height: 100%;
    background: #020408; display: flex; align-items: center; overflow: hidden;
  }
  .grid {
    position: absolute; inset: 0;
    background-image: linear-gradient(rgba(99,179,237,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(99,179,237,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  .orb { position: absolute; right: -80px; top: -100px; width: 500px; height: 500px; border-radius: 50%; background: radial-gradient(circle, rgba(99,179,237,0.12) 0%, rgba(66,153,225,0.06) 40%, transparent 70%); filter: blur(20px); }
  .orb2 { position: absolute; left: 200px; bottom: -200px; width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle, rgba(154,230,180,0.07) 0%, transparent 70%); filter: blur(30px); }

  .scatter { position: absolute; right: 80px; top: 50%; transform: translateY(-50%); width: 220px; height: 220px; z-index: 10; }
  .scatter svg { width: 100%; height: 100%; }

  .line-h { position: absolute; height: 1px; background: linear-gradient(90deg, transparent, rgba(99,179,237,0.35), transparent); }
  .line-h.top { top: 40px; left: 0; right: 0; }
  .line-h.bottom { bottom: 40px; left: 0; right: 0; }
  .line-v { position: absolute; width: 1px; background: linear-gradient(180deg, transparent, rgba(99,179,237,0.25), transparent); top: 0; bottom: 0; }
  .line-v.left { left: 40px; } .line-v.right { right: 40px; }

  .corner { position: absolute; width: 20px; height: 20px; border-color: rgba(99,179,237,0.5); border-style: solid; }
  .corner.tl { top: 30px; left: 30px; border-width: 2px 0 0 2px; }
  .corner.tr { top: 30px; right: 30px; border-width: 2px 2px 0 0; }
  .corner.bl { bottom: 30px; left: 30px; border-width: 0 0 2px 2px; }
  .corner.br { bottom: 30px; right: 30px; border-width: 0 2px 2px 0; }

  .code-tag { position: absolute; font-family: 'Space Mono', monospace; font-size: 11px; color: rgba(99,179,237,0.3); letter-spacing: 2px; }
  .code-tag.top-left { top: 16px; left: 60px; }
  .code-tag.bottom-right { bottom: 16px; right: 60px; }

  .content { position: relative; z-index: 10; padding: 0 80px; display: flex; flex-direction: column; gap: 12px; }

  .label { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 6px; color: rgba(99,179,237,0.8); text-transform: uppercase; display: flex; align-items: center; gap: 10px; }
  .label::before { content: ''; display: inline-block; width: 24px; height: 1px; background: rgba(99,179,237,0.8); }

  .name { font-family: 'Syne', sans-serif; font-size: 72px; font-weight: 800; color: #ffffff; line-height: 1; letter-spacing: -2px; }
  .name span.hollow { color: transparent; -webkit-text-stroke: 1.5px rgba(99,179,237,0.7); }

  .title-row { display: flex; align-items: center; gap: 16px; margin-top: 4px; }
  .title { font-family: 'Space Mono', monospace; font-size: 13px; color: rgba(255,255,255,0.45); letter-spacing: 3px; text-transform: uppercase; }
  .dot { width: 4px; height: 4px; border-radius: 50%; background: rgba(99,179,237,0.6); }

  .stack { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
  .tag { font-family: 'Space Mono', monospace; font-size: 10px; padding: 4px 10px; border: 1px solid rgba(99,179,237,0.2); color: rgba(99,179,237,0.7); letter-spacing: 1px; background: rgba(99,179,237,0.05); }

  .scanlines { position: absolute; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px); pointer-events: none; z-index: 20; }

  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  .cursor { display: inline-block; width: 3px; height: 0.85em; background: rgba(99,179,237,0.9); margin-left: 4px; vertical-align: middle; animation: blink 1.2s ease infinite; }

  @keyframes dash { to { stroke-dashoffset: 0; } }
  .trend-line { stroke-dasharray: 300; stroke-dashoffset: 300; animation: dash 2s ease forwards 0.5s; }

  @keyframes popIn { from { opacity: 0; transform: scale(0); } to { opacity: 1; transform: scale(1); } }
  .dot-point { animation: popIn 0.3s ease forwards; opacity: 0; }
</style>
</head>
<body>
<div class="banner">
  <div class="grid"></div>
  <div class="orb"></div>
  <div class="orb2"></div>
  <div class="line-h top"></div>
  <div class="line-h bottom"></div>
  <div class="line-v left"></div>
  <div class="line-v right"></div>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>
  <div class="code-tag top-left">// data.science.readme</div>

  <div class="content">
    <div class="label">Data Scientist</div>
    <div class="name">Ankit<span class="hollow">Uniyal</span><span class="cursor"></span></div>
    <div class="title-row">
      <div class="title">Data Analysis & Visualization</div>
      <div class="dot"></div>
      <div class="title">Open to Internships</div>
    </div>
    <div class="stack">
      <div class="tag">Python</div>
      <div class="tag">SQL</div>
      <div class="tag">n8n</div>
      <div class="tag">Linux OS</div>
      <div class="tag">Docker</div>
      <div class="tag">Power BI</div>
    </div>
  </div>

  <div class="scatter">
    <svg viewBox="0 0 220 220" fill="none" xmlns="http://www.w3.org/2000/svg">
      <line x1="20" y1="200" x2="200" y2="200" stroke="rgba(99,179,237,0.2)" stroke-width="1"/>
      <line x1="20" y1="20" x2="20" y2="200" stroke="rgba(99,179,237,0.2)" stroke-width="1"/>
      <line x1="20" y1="160" x2="200" y2="160" stroke="rgba(99,179,237,0.07)" stroke-width="1" stroke-dasharray="4 4"/>
      <line x1="20" y1="120" x2="200" y2="120" stroke="rgba(99,179,237,0.07)" stroke-width="1" stroke-dasharray="4 4"/>
      <line x1="20" y1="80" x2="200" y2="80" stroke="rgba(99,179,237,0.07)" stroke-width="1" stroke-dasharray="4 4"/>
      <line x1="60" y1="20" x2="60" y2="200" stroke="rgba(99,179,237,0.07)" stroke-width="1" stroke-dasharray="4 4"/>
      <line x1="100" y1="20" x2="100" y2="200" stroke="rgba(99,179,237,0.07)" stroke-width="1" stroke-dasharray="4 4"/>
      <line x1="140" y1="20" x2="140" y2="200" stroke="rgba(99,179,237,0.07)" stroke-width="1" stroke-dasharray="4 4"/>
      <line x1="180" y1="20" x2="180" y2="200" stroke="rgba(99,179,237,0.07)" stroke-width="1" stroke-dasharray="4 4"/>
      <path class="trend-line" d="M30 185 Q80 150 110 120 Q150 80 195 40" stroke="rgba(154,230,180,0.5)" stroke-width="1.5" stroke-dasharray="4 3" fill="none"/>
      <circle class="dot-point" cx="35" cy="178" r="3" fill="rgba(99,179,237,0.7)" style="animation-delay:0.1s"/>
      <circle class="dot-point" cx="55" cy="165" r="4" fill="rgba(99,179,237,0.5)" style="animation-delay:0.2s"/>
      <circle class="dot-point" cx="70" cy="155" r="3" fill="rgba(154,230,180,0.7)" style="animation-delay:0.3s"/>
      <circle class="dot-point" cx="85" cy="140" r="5" fill="rgba(99,179,237,0.6)" style="animation-delay:0.4s"/>
      <circle class="dot-point" cx="100" cy="128" r="3" fill="rgba(99,179,237,0.5)" style="animation-delay:0.5s"/>
      <circle class="dot-point" cx="115" cy="118" r="4" fill="rgba(154,230,180,0.6)" style="animation-delay:0.6s"/>
      <circle class="dot-point" cx="130" cy="100" r="3" fill="rgba(99,179,237,0.7)" style="animation-delay:0.7s"/>
      <circle class="dot-point" cx="148" cy="88" r="5" fill="rgba(99,179,237,0.5)" style="animation-delay:0.8s"/>
      <circle class="dot-point" cx="162" cy="72" r="3" fill="rgba(154,230,180,0.7)" style="animation-delay:0.9s"/>
      <circle class="dot-point" cx="178" cy="55" r="4" fill="rgba(99,179,237,0.6)" style="animation-delay:1s"/>
      <circle class="dot-point" cx="190" cy="42" r="3" fill="rgba(99,179,237,0.8)" style="animation-delay:1.1s"/>
      <circle class="dot-point" cx="45" cy="130" r="3" fill="rgba(99,179,237,0.3)" style="animation-delay:0.35s"/>
      <circle class="dot-point" cx="120" cy="155" r="3" fill="rgba(99,179,237,0.3)" style="animation-delay:0.65s"/>
      <circle class="dot-point" cx="160" cy="110" r="3" fill="rgba(154,230,180,0.3)" style="animation-delay:0.85s"/>
      <text x="110" y="215" fill="rgba(99,179,237,0.3)" font-size="8" font-family="monospace" text-anchor="middle">features</text>
      <text x="8" y="110" fill="rgba(99,179,237,0.3)" font-size="8" font-family="monospace" text-anchor="middle" transform="rotate(-90, 8, 110)">accuracy</text>
    </svg>
  </div>

  <div class="scanlines"></div>
</div>
</body>
</html>
